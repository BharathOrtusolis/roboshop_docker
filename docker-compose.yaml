services:

  mongodb:
    image: bharathkumarots/mongodb:v1
    container_name: mongodb
    networks:
      - roboshop

  redis:
    image: bharathkumarots/redis:v1
    container_name: redis
    networks:
      - roboshop

  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    networks:
      - roboshop

  catalogue:
    image: bharathkumarots/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
    networks:
      - roboshop

  user:
    image: bharathkumarots/user:v1
    container_name: user
    depends_on:
      - mongodb
      - redis
    networks:
      - roboshop

  cart:
    image: bharathkumarots/cart:v1
    container_name: cart
    depends_on:
      - catalogue
      - redis
    networks:
      - roboshop

  mysql:
    image: bharathkumarots/mysql:v1
    container_name: mysql
    networks:
      - roboshop

  shipping:
    image: bharathkumarots/shipping:v1
    container_name: shipping
    depends_on:
      - mysql
      - cart
      - rabbitmq
    networks:
      - roboshop

  payment:
    image: bharathkumarots/payment:v1
    container_name: payment
    environment:
      CART_HOST: cart
      CART_PORT: "8080"
      USER_HOST: user
      USER_PORT: "8080"
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on:
      - mysql
      - rabbitmq
      - cart
      - user
    networks:
      - roboshop
  frontend:
    image: bharathkumarots/frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment
    networks:
      - roboshop

networks:
  roboshop:
    driver: bridge